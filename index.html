<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Счёт на оплату</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{ --bg:#fff; --fg:#222; --muted:#888; --line:#e3e3e3; --accent:#2b7de9; }
  *{box-sizing:border-box;}
  body{ font-family:-apple-system,Roboto,Arial,sans-serif; margin:0; padding:14px; background:var(--bg); color:var(--fg); }
  h2{ font-size:18px; margin:0 0 12px; }
  .fld{ margin-bottom:10px; }
  .fld label{ display:block; font-size:12px; color:var(--muted); margin-bottom:3px; }
  input,select{ width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:15px; background:#fff; color:var(--fg); }
  .two{ display:flex; gap:8px; } .two>.fld{ flex:1; }
  button{ width:100%; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-size:16px; font-weight:600; margin-top:6px; }
  button:disabled{ opacity:.5; }
  .msg{ margin-top:10px; font-size:14px; }
  .err{ color:#c00; } .ok{ color:#137333; }
  .hint{ font-size:11px; color:var(--muted); margin-top:2px; }
</style>
</head>
<body>
<h2>Счёт / акт на оплату</h2>

<div class="fld"><label>Контрагент</label><input id="contr" list="contrList" placeholder="Поставщик" autocomplete="off"><datalist id="contrList"></datalist></div>
<div class="two">
  <div class="fld"><label>Тип</label><select id="type"><option>счёт</option><option>акт</option></select></div>
  <div class="fld"><label>№ документа</label><input id="docno"></div>
</div>
<div class="two">
  <div class="fld"><label>Дата документа</label><input id="docdate" type="date"></div>
  <div class="fld"><label>Дата оплаты</label><input id="paydate" type="date"></div>
</div>
<div class="fld"><label>Сумма, BYN</label><input id="sum" type="number" step="0.01" inputmode="decimal"></div>
<div class="fld"><label>Файл (PDF / фото / docx / xlsx)</label><input id="file" type="file"><div class="hint">Скан или фото документа</div></div>
<div class="fld"><label>Комментарий</label><input id="note"></div>

<button id="send" onclick="submitForm()">Отправить на одобрение</button>
<div class="msg" id="msg"></div>

<iframe name="sink" id="sink" style="display:none"></iframe>
<form id="hform" method="POST" target="sink" style="display:none">
  <input type="hidden" name="kind" value="submit">
  <input type="hidden" name="initData" id="h_initData">
  <input type="hidden" name="contr" id="h_contr">
  <input type="hidden" name="type" id="h_type">
  <input type="hidden" name="docNo" id="h_docNo">
  <input type="hidden" name="docDateIso" id="h_docDateIso">
  <input type="hidden" name="sum" id="h_sum">
  <input type="hidden" name="payDateIso" id="h_payDateIso">
  <input type="hidden" name="wallet" id="h_wallet" value="ООО BYN">
  <input type="hidden" name="note" id="h_note">
  <input type="hidden" name="fileB64" id="h_fileB64">
  <input type="hidden" name="fileName" id="h_fileName">
  <input type="hidden" name="fileMime" id="h_fileMime">
</form>

<script>
/* ВПИШИ СЮДА свой адрес веб-приложения, заканчивается на /exec */
var EXEC_URL = "https://script.google.com/macros/s/AKfycbxKBO433vS7HhZHYX6nzZiR8c72tjfzGagb2m7kZVfDllNuYPZajqz5DndzcRyBI7ZB/exec";

var tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }
(function(){ var d=new Date(); document.getElementById('paydate').value =
  d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();

window.fillContractors = function(list){
  var dl=document.getElementById('contrList'); dl.innerHTML='';
  (list||[]).forEach(function(name){ var o=document.createElement('option'); o.value=name; dl.appendChild(o); });
};
(function(){
  if(EXEC_URL.indexOf('exec')<0) return;
  var s=document.createElement('script');
  s.src=EXEC_URL+'?contractors=1&cb=fillContractors&t='+Date.now();
  document.body.appendChild(s);
})();

function val(id){ return (document.getElementById(id).value||'').trim(); }
function num(s){ return Number(String(s).replace(',','.'))||0; }
function setMsg(t, cls){ var m=document.getElementById('msg'); m.textContent=t; m.className='msg '+(cls||''); }
function setH(id,v){ document.getElementById('h_'+id).value=(v==null?'':v); }

function submitForm(){
  var contr=val('contr'), sum=num(val('sum'));
  if(!contr){ setMsg('Укажите контрагента','err'); return; }
  if(sum<=0){ setMsg('Укажите сумму','err'); return; }
  var initData = tg ? tg.initData : '';
  if(!initData){ setMsg('Откройте форму через бота (кнопка «Подать счёт»)','err'); return; }
  if(EXEC_URL.indexOf('exec')<0){ setMsg('Форма не настроена: не вписан адрес сервера','err'); return; }

  document.getElementById('send').disabled=true; setMsg('Отправляю...');

  var post=function(){
    setH('initData', initData);
    setH('contr', contr); setH('type', val('type')); setH('docNo', val('docno'));
    setH('docDateIso', val('docdate')); setH('sum', sum); setH('payDateIso', val('paydate'));
    setH('wallet', 'ООО BYN'); setH('note', val('note'));
    var f=document.getElementById('hform'); f.action=EXEC_URL; f.submit();
    setMsg('Готово! Счёт отправлен. Бот пришлёт подтверждение.','ok');
    if(tg){ setTimeout(function(){ tg.close(); }, 1800); }
  };

  var fi=document.getElementById('file');
  if(fi.files && fi.files[0]){
    var f=fi.files[0];
    if(f.size > 8*1024*1024){ setMsg('Файл больше 8 МБ - уменьшите','err'); document.getElementById('send').disabled=false; return; }
    var rd=new FileReader();
    rd.onload=function(){ setH('fileB64', rd.result.split(',')[1]); setH('fileName', f.name); setH('fileMime', f.type||'application/octet-stream'); post(); };
    rd.onerror=function(){ setMsg('Не удалось прочитать файл','err'); document.getElementById('send').disabled=false; };
    rd.readAsDataURL(f);
  } else { setH('fileB64',''); setH('fileName',''); setH('fileMime',''); post(); }
}
</script>
</body>
</html>
