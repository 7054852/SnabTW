<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Счета на оплату</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{ --bg:#fff; --fg:#222; --muted:#888; --line:#e3e3e3; --accent:#2b7de9; --green:#137333; --red:#c00; }
  *{box-sizing:border-box;}
  body{ font-family:-apple-system,Roboto,Arial,sans-serif; margin:0; padding:14px; background:var(--bg); color:var(--fg); }
  h2{ font-size:18px; margin:0 0 12px; }
  .fld{ margin-bottom:10px; }
  .fld label{ display:block; font-size:12px; color:var(--muted); margin-bottom:3px; }
  input,select{ width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:15px; background:#fff; color:var(--fg); }
  .two{ display:flex; gap:8px; } .two>.fld{ flex:1; }
  button{ width:100%; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-size:16px; font-weight:600; margin-top:6px; }
  button:disabled{ opacity:.5; }
  button.gray{ background:#eee; color:#333; }
  button.green{ background:var(--green); }
  button.redb{ background:var(--red); }
  .msg{ margin-top:10px; font-size:14px; }
  .err{ color:var(--red); } .ok{ color:var(--green); }
  .hint{ font-size:11px; color:var(--muted); margin-top:2px; }
  .back{ font-size:13px; color:var(--accent); cursor:pointer; margin-bottom:8px; display:inline-block; }
  .card{ border:1px solid var(--line); border-radius:10px; padding:10px; margin-bottom:10px; }
  .card .top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .card .nm{ font-weight:600; }
  .card .sm{ font-size:12px; color:var(--muted); margin-top:2px; }
  .card .row2{ display:flex; gap:8px; align-items:center; margin-top:8px; }
  .card .row2 input[type=date]{ font-size:13px; padding:6px 8px; }
  .card .fc{ font-size:12px; font-weight:600; }
  .card .acts{ display:flex; gap:8px; margin-top:8px; }
  .card .acts button{ margin-top:0; padding:9px; font-size:14px; }
  a{ color:var(--accent); }
</style>
</head>
<body>

<!-- РАЗВИЛКА -->
<div id="menuView" style="display:none;">
  <h2>Счета на оплату</h2>
  <button onclick="showSubmit()">📄 Подать счёт</button>
  <button class="green" id="btnApprove" onclick="showApprove()" style="display:none;">✅ Одобрить счета</button>
  <div class="msg" id="menuMsg"></div>
</div>

<!-- ПОДАЧА -->
<div id="submitView" style="display:none;">
  <span class="back" id="subBack" onclick="showMenu()" style="display:none;">‹ назад</span>
  <h2>Счёт / акт на оплату</h2>
  <div class="fld"><label>Контрагент</label><input id="contr" list="contrList" placeholder="Поставщик" autocomplete="off"><datalist id="contrList"></datalist></div>
  <div class="two">
    <div class="fld"><label>Тип</label><select id="type"><option>счёт</option><option>акт</option></select></div>
    <div class="fld"><label>№ документа</label><input id="docno"></div>
  </div>
  <div class="two">
    <div class="fld"><label>Дата документа</label><input id="docdate" type="date"></div>
    <div class="fld"><label>Дата оплаты</label><input id="paydate" type="date"></div>
  </div>
  <div class="fld"><label>Сумма, BYN</label><input id="sum" type="number" step="0.01" inputmode="decimal"></div>
  <div class="fld"><label>Файл (PDF / фото / docx / xlsx)</label><input id="file" type="file"><div class="hint">Скан или фото документа</div></div>
  <div class="fld"><label>Комментарий</label><input id="note"></div>
  <button id="send" onclick="submitForm()">Отправить на одобрение</button>
  <div class="msg" id="msg"></div>
</div>

<!-- ОДОБРЕНИЕ -->
<div id="approveView" style="display:none;">
  <span class="back" onclick="showMenu()">‹ назад</span>
  <h2>Счета на одобрении</h2>
  <div class="hint" style="margin-bottom:8px;">Зелёным — денег на дату хватает, красным — нет (поменяйте дату оплаты).</div>
  <div id="apList"></div>
  <div class="msg" id="apMsg"></div>
  <button class="gray" onclick="loadInbox()">Обновить список</button>
</div>

<iframe name="sink" id="sink" style="display:none"></iframe>
<form id="hform" method="POST" target="sink" style="display:none">
  <input type="hidden" name="kind" id="h_kind" value="submit">
  <input type="hidden" name="initData" id="h_initData">
  <input type="hidden" name="contr" id="h_contr">
  <input type="hidden" name="type" id="h_type">
  <input type="hidden" name="docNo" id="h_docNo">
  <input type="hidden" name="docDateIso" id="h_docDateIso">
  <input type="hidden" name="sum" id="h_sum">
  <input type="hidden" name="payDateIso" id="h_payDateIso">
  <input type="hidden" name="wallet" id="h_wallet" value="ООО BYN">
  <input type="hidden" name="note" id="h_note">
  <input type="hidden" name="fileB64" id="h_fileB64">
  <input type="hidden" name="fileName" id="h_fileName">
  <input type="hidden" name="fileMime" id="h_fileMime">
  <input type="hidden" name="id" id="h_id">
</form>

<script>
/* ВПИШИ СЮДА свой адрес веб-приложения, заканчивается на /exec */
var EXEC_URL = "https://script.google.com/macros/s/AKfycbxKBO433vS7HhZHYX6nzZiR8c72tjfzGagb2m7kZVfDllNuYPZajqz5DndzcRyBI7ZB/exec";

var tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }
function initData(){ return tg ? tg.initData : ''; }
function val(id){ var el=document.getElementById(id); return el ? (el.value||'').trim() : ''; }
function num(s){ return Number(String(s).replace(',','.'))||0; }
function fmt(n){ return (Number(n)||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function setH(id,v){ document.getElementById('h_'+id).value=(v==null?'':v); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function show(id){ ['menuView','submitView','approveView'].forEach(function(v){ document.getElementById(v).style.display = (v===id?'block':'none'); }); }

var ROLE = { canSubmit:false, canApprove:false };

// старт: узнаём роль и решаем, что показать
(function start(){
  if(EXEC_URL.indexOf('exec')<0){ show('submitView'); initSubmit(); return; }
  if(!initData()){ show('submitView'); initSubmit(); return; }   // вне Telegram — просто форма (подача всё равно потребует подпись)
  window.onRole = function(r){
    if(r && r.ok){
      ROLE.canSubmit = !!r.canSubmit; ROLE.canApprove = !!r.canApprove;
      if(ROLE.canApprove){
        // директор — показываем развилку
        document.getElementById('btnApprove').style.display='block';
        document.getElementById('subBack').style.display='inline-block';
        show('menuView');
      } else {
        // закупщик — сразу форма подачи
        show('submitView'); initSubmit();
      }
    } else {
      show('submitView'); initSubmit();
    }
  };
  var s=document.createElement('script');
  s.onerror=function(){ show('submitView'); initSubmit(); };
  s.src=EXEC_URL+'?role=1&cb=onRole&initData='+encodeURIComponent(initData())+'&t='+Date.now();
  document.body.appendChild(s);
})();

function showMenu(){ show('menuView'); }
function showSubmit(){ show('submitView'); initSubmit(); }
function showApprove(){ show('approveView'); loadInbox(); }

/* ===== ПОДАЧА ===== */
var submitInited=false;
function initSubmit(){
  var d=new Date();
  document.getElementById('paydate').value = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(submitInited) return; submitInited=true;
  window.fillContractors = function(list){
    var dl=document.getElementById('contrList'); dl.innerHTML='';
    (list||[]).forEach(function(name){ var o=document.createElement('option'); o.value=name; dl.appendChild(o); });
  };
  if(EXEC_URL.indexOf('exec')>=0){
    var s=document.createElement('script');
    s.src=EXEC_URL+'?contractors=1&cb=fillContractors&t='+Date.now();
    document.body.appendChild(s);
  }
}
function setMsg(t, cls){ var m=document.getElementById('msg'); m.textContent=t; m.className='msg '+(cls||''); }
function submitForm(){
  var contr=val('contr'), sum=num(val('sum'));
  if(!contr){ setMsg('Укажите контрагента','err'); return; }
  if(sum<=0){ setMsg('Укажите сумму','err'); return; }
  if(!initData()){ setMsg('Откройте форму через бота','err'); return; }
  if(EXEC_URL.indexOf('exec')<0){ setMsg('Форма не настроена: не вписан адрес сервера','err'); return; }
  document.getElementById('send').disabled=true; setMsg('Отправляю...');
  var post=function(){
    setH('kind','submit'); setH('initData', initData());
    setH('contr', contr); setH('type', val('type')); setH('docNo', val('docno'));
    setH('docDateIso', val('docdate')); setH('sum', sum); setH('payDateIso', val('paydate'));
    setH('wallet', 'ООО BYN'); setH('note', val('note')); setH('id','');
    var f=document.getElementById('hform'); f.action=EXEC_URL; f.submit();
    setMsg('Готово! Счёт отправлен. Бот пришлёт подтверждение.','ok');
    if(tg){ setTimeout(function(){ tg.close(); }, 1800); }
  };
  var fi=document.getElementById('file');
  if(fi.files && fi.files[0]){
    var fl=fi.files[0];
    if(fl.size > 8*1024*1024){ setMsg('Файл больше 8 МБ - уменьшите','err'); document.getElementById('send').disabled=false; return; }
    var rd=new FileReader();
    rd.onload=function(){ setH('fileB64', rd.result.split(',')[1]); setH('fileName', fl.name); setH('fileMime', fl.type||'application/octet-stream'); post(); };
    rd.onerror=function(){ setMsg('Не удалось прочитать файл','err'); document.getElementById('send').disabled=false; };
    rd.readAsDataURL(fl);
  } else { setH('fileB64',''); setH('fileName',''); setH('fileMime',''); post(); }
}

/* ===== ОДОБРЕНИЕ ===== */
function apMsg(t, cls){ var m=document.getElementById('apMsg'); m.textContent=t; m.className='msg '+(cls||''); }
function loadInbox(){
  if(EXEC_URL.indexOf('exec')<0){ apMsg('Не настроен адрес сервера','err'); return; }
  if(!initData()){ apMsg('Откройте через бота','err'); return; }
  apMsg('Загружаю...');
  window.onInbox = function(res){
    if(!res || res.ok===false){ apMsg((res&&res.error)||'Ошибка загрузки','err'); return; }
    apMsg('');
    renderInbox(res.items||[]);
  };
  var s=document.createElement('script');
  s.onerror=function(){ apMsg('Сеть недоступна','err'); };
  s.src=EXEC_URL+'?inbox=1&cb=onInbox&initData='+encodeURIComponent(initData())+'&t='+Date.now();
  document.body.appendChild(s);
}
function renderInbox(items){
  var box=document.getElementById('apList');
  if(!items.length){ box.innerHTML='<div class="hint">Нет счетов на одобрении.</div>'; return; }
  box.innerHTML = items.map(function(x){
    var col = x.enough ? 'var(--green)' : 'var(--red)';
    var file = x.file ? '<a href="'+esc(x.file)+'" target="_blank">открыть файл</a>' : '<span class="hint">нет файла</span>';
    return '<div class="card" id="ap_'+esc(x.id)+'">'
      + '<div class="top"><span class="nm">'+esc(x.contr||'—')+'</span><span class="nm">'+fmt(x.sum)+'</span></div>'
      + '<div class="sm">'+esc(x.type||'счёт')+(x.docNo?(' №'+esc(x.docNo)):'')+' · '+file+'</div>'
      + '<div class="row2"><span class="hint">оплатить:</span>'
        + '<input type="date" id="apd_'+esc(x.id)+'" value="'+esc(x.payDateIso||'')+'">'
        + '<span class="fc" style="color:'+col+';">остаток: '+fmt(x.afterPay)+'</span></div>'
      + '<div class="acts">'
        + '<button class="green" onclick="approve(\''+esc(x.id)+'\')">Одобрить</button>'
        + '<button class="redb" onclick="reject(\''+esc(x.id)+'\')">Отклонить</button></div>'
      + '</div>';
  }).join('');
}
function sendAction(kind, id){
  setH('kind', kind); setH('initData', initData()); setH('id', id);
  setH('payDateIso', kind==='approve' ? (val('apd_'+id)||'') : '');
  setH('wallet','ООО BYN');
  ['contr','type','docNo','docDateIso','sum','note','fileB64','fileName','fileMime'].forEach(function(f){ setH(f,''); });
  var f=document.getElementById('hform'); f.action=EXEC_URL; f.submit();
}
function approve(id){
  apMsg('Одобряю...'); sendAction('approve', id);
  var card=document.getElementById('ap_'+id); if(card) card.style.opacity='0.4';
  setTimeout(loadInbox, 1500);
}
function reject(id){
  if(!confirm('Отклонить счёт?'))return;
  apMsg('Отклоняю...'); sendAction('reject', id);
  var card=document.getElementById('ap_'+id); if(card) card.style.opacity='0.4';
  setTimeout(loadInbox, 1500);
}
</script>
</body>
</html>
